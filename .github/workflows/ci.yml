name: CI
on:
  push:
    branches: [main]
  pull_request:

# Security posture: never use pull_request_target with secrets on a public
# repo; CI needs no secrets at all.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: llms.txt drift check
        run: |
          node scripts/generate-llms-txt.mjs --check
