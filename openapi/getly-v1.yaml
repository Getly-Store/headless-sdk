  /go/{linkId}:
    get:
      operationId: redirectCheckoutLink
      tags:
        - Public
        - Checkout Links
      x-public: true
      summary: Public checkout-link redirect (buyer-facing)
      description: |-
        NO auth — this is the URL you hand to buyers. Validates the link at
        click time (product still active, seller not suspended, coupon still
        valid), lazily creates the Stripe Checkout Session and 302-redirects
        the buyer into payment with the coupon auto-applied. Stale/expired/
        completed links redirect to the product page (full-price purchase stays
        possible) — never a dead end. Per-IP velocity limited.
      parameters:
        - name: linkId
          in: path
          required: true
          description: Checkout link id (uuid) from createCheckoutLink.
          schema:
            type: string
            format: uuid
      x-errors: []
      responses:
        '302':
          description: Redirect to Stripe Checkout (happy path), or to the product page / homepage for stale links.
  /api/v1/public/checkout:
    post:
      operationId: createPublicCheckout
      tags:
        - Public
        - Pay Widget
      x-public: true
      summary: Mint a Pay Widget checkout (buyer-facing, no auth)
      description: |-
        NO auth — this is what the embeddable pay.js Buy button calls from a
        seller's own website. Given a store slug + product slug it mints a
        one-shot checkout for that product and returns either a hosted Stripe
        Checkout url (popup / redirect) or an embedded clientSecret (inline).
        The PRICE IS ALWAYS READ FROM THE PRODUCT ROW — any price the browser
        sends is ignored. Only active, fixed-price (> 0) products of a
        non-suspended seller are sellable; free / pay-what-you-want / unknown
        products return not_purchasable (or a leak-safe not_found). Protected by
        layered anti-abuse: per-IP / per-product / per-origin velocity limits,
        an optional origin allowlist, a per-store kill switch, a concurrent-open
        cap and (for untrusted stores) a Cloudflare Turnstile challenge. You
        normally never call this directly — embed the widget from /pay-widget.
      parameters:
        - name: Origin
          in: header
          required: false
          description: The embedding site's origin. Enforced against the store's domain allowlist when the seller has set one.
          schema:
            type: string
      x-errors:
        - validation_failed
        - not_found
        - not_purchasable
        - widget_disabled
        - origin_not_allowed
        - challenge_required
        - rate_limited
      requestBody:
        required: true
        content:
          application/json:
            example:
              storeSlug: acme-studio
              productSlug: icon-pack-pro
              mode: popup
              challengeToken: turnstile-token-when-challenged
      responses:
        '200':
          description: Checkout minted. popup / redirect return url; inline returns clientSecret + publishableKey. All amounts integer cents.
          content:
            application/json:
              example:
                success: true
                data:
                  url: https://checkout.stripe.com/c/pay/cs_test_a1b2c3
                  sessionId: cs_test_a1b2c3
                  linkId: 4d5e6f7a-8b9c-0d1e-2f3a-4b5c6d7e8f9a
                  priceCents: 2900
                  currency: USD
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '403':
          description: Widget disabled for the store, origin not allowed, or a Turnstile challenge is required. For challenge_required the errorDetail carries challengeSiteKey.
          content:
            application/json:
              example:
                success: false
                error: A verification challenge is required.
                errorDetail:
                  code: challenge_required
                  message: A verification challenge is required.
                  hint: Render Cloudflare Turnstile with the returned challengeSiteKey and retry with the token. The pay.js embed does this automatically.
                  docsUrl: https://www.getly.store/pay-widget
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/public/checkout/{linkId}/status:
    get:
