            application/json:
              example:
                success: true
                data:
                  - id: 5b6c7d8e-9f0a-1b2c-3d4e-5f6a7b8c9d0e
                    orderId: 6e7f8a9b-0c1d-2e3f-4a5b-6c7d8e9f0a1b
                    productId: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                    price: 2900
                    sellerAmount: 2320
                    platformAmount: 580
                    licenseType: personal
                    createdAt: '2026-07-04T11:02:33.000Z'
                    order:
                      id: 6e7f8a9b-0c1d-2e3f-4a5b-6c7d8e9f0a1b
                      status: completed
                      buyer:
                        id: 0a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
                        name: Jane Buyer
                    product:
                      id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                      name: Notion Startup OS
