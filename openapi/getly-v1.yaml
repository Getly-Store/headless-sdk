components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: getly_sk_live_<hex>
      description: |-
        Send `Authorization: Bearer <key>`. Create keys at
        https://www.getly.store/dashboard/developer/keys and grant only the
        scopes you need. Keys look like `getly_sk_live_<64 hex>` (legacy `gk_`
        keys keep working; rotated keys have a 24h grace window). Read the key
        from the GETLY_API_KEY environment variable — never hardcode, never
        log, never accept it as a CLI/tool argument.

        Scopes: read:products, write:products, read:orders, read:store,
        write:store, read:analytics, webhooks:manage, read:posts, write:posts,
        read:coupons, write:coupons, read:licenses, write:licenses,
        checkout:create.
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor from the previous page's `nextCursor` (base64 of "createdAtISO|id" — treat as opaque).
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Page size, 1-100 (default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Unique string (≤255 chars) making this POST safely retryable for 24h. Replays return the stored response with `Idempotency-Replayed:true`; a key still processing returns 409 idempotency_conflict — retry with the SAME key.
      schema:
        type: string
        maxLength: 255
    ProductId:
      name: id
      in: path
      required: true
      description: Product id (uuid).
      schema:
        type: string
        format: uuid
    PostId:
      name: id
      in: path
      required: true
      description: Post id (uuid).
      schema:
        type: string
        format: uuid
    CouponId:
      name: id
      in: path
      required: true
      description: Coupon id (uuid).
      schema:
        type: string
        format: uuid
    CheckoutLinkId:
      name: id
      in: path
      required: true
      description: Checkout link id (uuid).
      schema:
        type: string
        format: uuid
    WebhookEndpointId:
      name: id
      in: path
      required: true
      description: Webhook endpoint id (uuid).
      schema:
        type: string
        format: uuid
  headers:
    XRateLimitLimit:
      description: Request ceiling for the current window.
      schema:
        type: integer
    XRateLimitRemaining:
      description: Requests remaining in the current window — throttle proactively when low.
      schema:
        type: integer
    XRateLimitReset:
      description: Seconds until the window resets.
      schema:
        type: integer
    RetryAfter:
      description: Seconds to wait before retrying (429 only).
      schema:
        type: integer
    IdempotencyReplayed:
      description: Present ("true") when this response was replayed from a stored Idempotency-Key result.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing/invalid API key.
      content:
        application/json:
          example:
            success: false
            error: Unauthorized
            errorDetail:
              code: unauthorized
              message: Unauthorized
              hint: 'Send your API key as `Authorization: Bearer <key>`. Create one at https://www.getly.store/dashboard/developer/keys — read it from an environment variable, never hardcode it.'
              docsUrl: https://www.getly.store/developers/api#errors
    InsufficientScope:
      description: The API key is missing the required scope (named in `param`).
      content:
        application/json:
          example:
            success: false
            error: 'Missing scope: write:products'
            errorDetail:
              code: insufficient_scope
              message: 'Missing scope: write:products'
              hint: Your API key is missing a required scope. Create a key with the needed scope at https://www.getly.store/dashboard/developer/keys and update your environment variable.
              docsUrl: https://www.getly.store/developers/api#errors
              param: write:products
    NotFound:
      description: Resource not found (or owned by another store — ownership misses read as 404, never an oracle).
      content:
        application/json:
          example:
            success: false
            error: Product not found
            errorDetail:
              code: not_found
              message: Product not found
              docsUrl: https://www.getly.store/developers/api#errors
    ValidationFailed:
      description: A request field is invalid — `param` names it.
      content:
        application/json:
          example:
            success: false
            error: priceCents must be a non-negative integer (minor units)
            errorDetail:
              code: validation_failed
              message: priceCents must be a non-negative integer (minor units)
              hint: Fix the field named in `param` and retry the same request (re-send your Idempotency-Key).
              docsUrl: https://www.getly.store/developers/api#errors
              param: priceCents
    RateLimited:
      description: Too many requests — wait Retry-After seconds.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          example:
            success: false
            error: Too many requests
            errorDetail:
              code: rate_limited
              message: Too many requests
              hint: Wait for the number of seconds in the Retry-After header, then retry. Throttle proactively when X-RateLimit-Remaining gets low.
              docsUrl: https://www.getly.store/developers/api#errors
    IdempotencyConflict:
      description: A request with this Idempotency-Key is still processing — wait 2-5s and retry with the SAME key.
      content:
        application/json:
          example:
            success: false
            error: A request with this Idempotency-Key is already processing
            errorDetail:
              code: idempotency_conflict
              message: A request with this Idempotency-Key is already processing
              hint: A request with this Idempotency-Key is still processing. Wait 2-5 seconds and retry with the SAME key to get its result.
              docsUrl: https://www.getly.store/developers/api#errors
  x-error-codes:
    unauthorized: 'Send your API key as `Authorization: Bearer <key>`. Create one at https://www.getly.store/dashboard/developer/keys — read it from an environment variable, never hardcode it.'
    insufficient_scope: Your API key is missing a required scope. Create a key with the needed scope at https://www.getly.store/dashboard/developer/keys and update your environment variable.
    rate_limited: Wait for the number of seconds in the Retry-After header, then retry. Throttle proactively when X-RateLimit-Remaining gets low.
    validation_failed: Fix the field named in `param` and retry the same request (re-send your Idempotency-Key).
    not_found: The resource does not exist or belongs to another store.
    publish_requires_file: 'Attach at least one downloadable file first: POST /api/v1/products/{id}/files/presign → PUT the bytes → POST /api/v1/products/{id}/files. Then publish.'
    moderation_locked: This product is awaiting (or was rejected in) moderation and cannot be self-published. Tell the user to check /dashboard/products — do not retry automatically.
    not_publishable: Fix every entry in the `reasons` array (each has a machine code and a detail), then call publish again.
    idempotency_conflict: A request with this Idempotency-Key is still processing. Wait 2-5 seconds and retry with the SAME key to get its result.
    coupon_invalid: The coupon code does not exist, is inactive, is exhausted, or belongs to another store. List valid codes with GET /api/v1/coupons.
    not_purchasable: The product cannot be sold through the Pay Widget — it must be an active, fixed-price product above $0 (not free or pay-what-you-want). Pick a different product or change its pricing.
    widget_disabled: The store has turned the Pay Widget off (or anti-abuse auto-disabled it). The seller re-enables it at /dashboard/pay-widget.
    origin_not_allowed: The request's Origin is not in the store's domain allowlist. Add the embedding site's domain at /dashboard/pay-widget, or embed only on allowed domains.
    challenge_required: A Cloudflare Turnstile challenge is required. Render the widget with the returned challengeSiteKey and retry with the token — the pay.js embed handles this automatically.
    high_discount_ack_required: 'Discounts of 90% or more (or unlimited-use coupons) require `acknowledgeHighDiscount: true` in the body. Confirm the discount with the user before adding it.'
    quota_exceeded: Daily creation cap reached for this API key (products 20/day, posts 5/day, coupons 30/day). Retry after the UTC midnight reset, or ask the user to contact support for a higher limit.
    expired: The resource has expired. Create a fresh one.
    license_invalid: The license key does not exist or was deactivated.
    activation_limit_reached: All activation seats are used. Deactivate an old device via POST /api/v1/licenses/deactivate or ask the buyer to upgrade.
    internal_error: Unexpected server error — safe to retry with the same Idempotency-Key.
  schemas:
    ErrorDetail:
      type: object
      description: |-
        Machine-readable error detail attached to every v1 error response
        alongside the legacy `error` string. Branch on `code` (stable registry
        — see ErrorCodes); `hint` is written for LLM consumption and says what
        to DO next; `param` names the offending field or missing scope when
        applicable.
      required:
        - code
        - message
        - docsUrl
      properties:
        code:
          $ref: '#/components/schemas/ErrorCodes'
        message:
          type: string
          description: Human-readable error message (same as the top-level `error`).
        hint:
          type: string
          description: Actionable next step, written for AI clients.
        docsUrl:
          type: string
          format: uri
          description: Link into https://www.getly.store/developers documentation.
        param:
          type: string
          description: The request field (or scope) this error is about, when applicable.
    ErrorCodes:
      type: string
      description: |-
        Stable machine-readable error-code registry (src/lib/api-v1.ts is the
        canonical source). Codes and what to do:
        unauthorized — send Authorization Bearer key from the GETLY_API_KEY env var;
        insufficient_scope — mint a key with the scope named in `param`;
        rate_limited — wait Retry-After seconds, then retry;
        validation_failed — fix the field named in `param` and re-send;
        not_found — the resource does not exist or belongs to another store;
        publish_requires_file — attach a downloadable file, then publish;
        moderation_locked — awaiting/failed moderation, do not retry automatically;
        not_publishable — fix every entry in the publish `reasons` array;
        idempotency_conflict — same Idempotency-Key still processing, retry with the SAME key;
        coupon_invalid — coupon missing/inactive/exhausted/foreign;
        high_discount_ack_required — resend with acknowledgeHighDiscount true after confirming;
        quota_exceeded — daily creation cap hit, retry after UTC midnight;
        expired — create a fresh resource;
        license_invalid — license key unknown or deactivated;
        activation_limit_reached — free a seat via licenses/deactivate;
        internal_error — server fault, safe to retry with the same Idempotency-Key.
      enum:
        - unauthorized
        - insufficient_scope
        - rate_limited
        - validation_failed
        - not_found
        - publish_requires_file
        - moderation_locked
        - not_publishable
        - idempotency_conflict
        - coupon_invalid
        - high_discount_ack_required
        - quota_exceeded
        - expired
        - license_invalid
        - activation_limit_reached
        - internal_error
    ErrorEnvelope:
      type: object
      description: Every v1 error response body.
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
          description: Legacy human-readable message (kept for back-compat).
        errorDetail:
          $ref: '#/components/schemas/ErrorDetail'
    Product:
      type: object
      description: Seller product as returned by the authenticated product endpoints. Money in integer cents via priceCents/compareAtPriceCents (legacy price/compareAtPrice carry the same cent values — use the *Cents names).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        slug:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        priceCents:
          type: integer
          minimum: 0
          description: Price in integer cents (minor units). THE money field.
        compareAtPriceCents:
          type: integer
          minimum: 0
          description: Strike-through price in cents, or null.
        price:
          type: integer
          deprecated: true
          description: Legacy alias — same integer-cents value as priceCents.
        status:
          type: string
          enum:
            - draft
            - active
            - pending_review
            - rejected
            - archived
        categoryId:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
        licenseKeysEnabled:
          type: boolean
          description: When true a license key is issued to the buyer at fulfillment.
        licenseActivationLimit:
          type: integer
          minimum: 1
          maximum: 100
          default: 3
        createdVia:
          type: string
          description: Provenance — "api" for API-created products.
        moderationStatus:
          type: string
          description: Present when a trust/AI gate queued the product for review (value pending_review).
        note:
          type: string
          description: Human explanation accompanying moderationStatus.
        urls:
          type: object
          properties:
            product:
              type: string
              format: uri
            buy:
              type: string
              format: uri
              description: Purchase entry point (guest-checkout capable).
            embed:
              type: string
              format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProductFile:
      type: object
      description: Downloadable file attached to a product. Download URLs are never exposed through the read API.
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        fileUrl:
          type: string
          format: uri
          description: Storage URL (present on attach/list-files responses).
        fileSize:
          type: integer
          description: Bytes.
        fileType:
          type: string
        version:
          type: string
        isLatest:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Post:
      type: object
      description: Creator blog post. Markdown (contentMarkdown) is the source of truth; contentHtml is derived and sanitized on every read.
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 500
        slug:
          type: string
        excerpt:
          type: string
          maxLength: 500
        contentMarkdown:
          type: string
          description: Raw markdown, ≤100KB. Supports the [product:slug] shortcode.
        contentHtml:
          type: string
          description: Sanitized HTML rendered from contentMarkdown (read-only).
        coverImageUrl:
          type: string
          format: uri
        visibility:
          type: string
          const: public
        status:
          type: string
          enum:
            - draft
            - published
        createdVia:
          type: string
        publishedAt:
          type: string
          format: date-time
          description: Set on first publish, kept stable afterwards.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Coupon:
      type: object
      description: Store coupon. For type=fixed, value/valueCents are integer cents; for type=percentage, value is a bare 1-100 integer (NOT money — no valueCents alias). code, type and value are immutable after creation.
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^[A-Z0-9-]{3,50}$
        type:
          type: string
          enum:
            - percentage
            - fixed
        value:
          type: integer
          description: Percentage 1-100, or cents when type=fixed.
        valueCents:
          type: integer
          description: Present only for fixed coupons — same cents value as value.
        minOrderAmount:
          type: integer
          description: Cents (legacy name).
        minOrderAmountCents:
          type: integer
          description: Minimum order total in cents.
        maxUses:
          type: integer
          description: Null = unlimited.
        usedCount:
          type: integer
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CheckoutLink:
      type: object
      description: Instant pay link. Share `url` with the buyer; poll status or subscribe to checkout_link.completed.
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          description: The shareable https://www.getly.store/go/{id} redirect.
        productId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - open
            - completed
            - expired
        reference:
          type: string
          maxLength: 200
          description: Your correlation id — echoed into webhooks.
        metadata:
          type: object
          description: Up to 20 string entries, ≤2KB total — echoed into webhooks.
        orderId:
          type: string
          format: uuid
          description: Set once status=completed.
        priceCents:
          type: integer
          description: Product price in cents at link time.
        discountedPriceCents:
          type: integer
          description: Price after the coupon, in cents.
        couponApplied:
          type: boolean
        currency:
          type: string
          const: USD
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    LicenseKey:
      type: object
      description: License key issued at order fulfillment for products with licenseKeysEnabled.
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Display format GETLY-XXXX-XXXX-XXXX-XXXX.
        productId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - active
            - deactivated
        activationLimit:
          type: integer
        activationCount:
          type: integer
        activations:
          type: array
          items:
            type: object
            properties:
              fingerprint:
                type: string
              label:
                type: string
              activatedAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time
    PublicProduct:
      type: object
      description: Public (no-auth) product shape for the storefront widget. Localized name/shortDescription/description variants (…Ru, …De) appear when available.
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        shortDescription:
          type: string
        description:
          type: string
          description: Only on the single-product endpoint.
        priceCents:
          type: integer
        price:
          type: integer
          deprecated: true
          description: Legacy alias — same cents value as priceCents.
        currency:
          type: string
          const: USD
        avgRating:
          type: number
        reviewCount:
          type: integer
        images:
          type: array
          maxItems: 3
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              altText:
                type: string
        urls:
          type: object
          properties:
            product:
              type: string
              format: uri
            buy:
              type: string
              format: uri
    WebhookEndpoint:
      type: object
      description: Registered webhook endpoint. `secret` appears exactly once — in the create response.
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          description: Event types, or ["*"] for all. See x-webhooks for the list.
        isActive:
          type: boolean
        secret:
          type: string
          description: HMAC secret — returned only at creation, store it immediately.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
