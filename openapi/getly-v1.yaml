      x-public: true
      summary: Activate a license on a device (PUBLIC, no auth)
      description: |-
        Claims an activation seat for a device/install. Idempotent per
        fingerprint — re-activating an already-active fingerprint succeeds
        without consuming a seat. fingerprint is any stable device/install
        identifier (1-200 chars); label is an optional human name. Fires the
        license.activated webhook to the product's store. Rate-limited per IP.
