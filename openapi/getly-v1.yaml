                hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/orders/{id}:
    get:
      operationId: getOrder
      tags:
        - Orders
