                  name: Maker Studio
                  slug: maker-studio
                  commissionPercent: 90
                  createdAt: '2026-07-04T09:00:00.000Z'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '409':
          description: You already have a store (or Idempotency-Key still processing).
          content:
            application/json:
              example:
                success: false
                error: You already have a store
                errorDetail:
                  code: validation_failed
                  message: You already have a store
                  hint: Use GET /api/v1/store to read it and PATCH /api/v1/store to update it.
                  docsUrl: https://www.getly.store/developers/api#errors
        '429':
          $ref: '#/components/responses/RateLimited'
    patch:
      operationId: updateStore
      tags:
        - Store
      x-scope: write:store
      summary: Update your store profile
      description: Updatable — name (1-100 chars), description (≤5000), website (http/https URL), socialLinks (object).
      x-errors:
        - unauthorized
        - insufficient_scope
        - validation_failed
        - rate_limited
      requestBody:
        required: true
        content:
          application/json:
            example:
              description: Templates and tools for indie makers.
              website: https://maker.studio
      responses:
        '200':
          description: Updated store.
          content:
            application/json:
              example:
                success: true
                data:
                  id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
                  name: Maker Studio
                  description: Templates and tools for indie makers.
                  website: https://maker.studio
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/store/payout-onboarding:
    post:
      operationId: createPayoutOnboardingLink
      tags:
        - Store
      x-scope: write:store
      summary: Get a Stripe Connect payout-onboarding link
      description: |-
        Creates (or reuses) the Stripe Connect Express account for the key's
        user and returns a fresh onboarding account-link URL. The URL is
        short-lived — send the seller there promptly. This is one of the few
        steps that must finish in a browser (Stripe identity collection).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - idempotency_conflict
        - rate_limited
      responses:
        '200':
          description: Onboarding link.
          content:
            application/json:
              example:
                success: true
                data:
                  url: https://connect.stripe.com/setup/e/acct_123/abcdef
                  expiresAt: '2026-07-04T10:05:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/payouts:
    get:
      operationId: getPayouts
      tags:
        - Analytics
        - Store
      x-scope: read:store
      summary: Read-only money snapshot (balances, upcoming payouts)
      description: |-
        Requires read:store OR read:analytics. Same single source of truth as
        the dashboard payouts page, reconciled with the 1st/15th payout cron.
        All amounts are integer cents. `method` per upcoming payout is stripe
        or crypto depending on the seller's payout preference.
      x-errors:
        - unauthorized
        - insufficient_scope
        - rate_limited
      responses:
        '200':
          description: Money snapshot.
          content:
            application/json:
              example:
                success: true
                data:
                  period:
                    start: '2026-07-01T00:00:00.000Z'
                    end: '2026-07-31T23:59:59.000Z'
                  balances:
                    pendingCents: 15200
                    belowMinimumHeldCents: 0
                    proPoolHeldCents: 0
                    proPoolPendingCents: 0
                  thisPeriod:
                    incomeCents: 8700
                    expensesCents: 0
                    netCents: 8700
                  lifetime:
                    incomeCents: 45200
                    paidOutCents: 30000
                    pendingCents: 15200
                  upcomingPayouts:
                    - date: '2026-07-15T03:00:00.000Z'
                      amountCents: 15200
                      method: stripe
                    - date: '2026-08-01T03:00:00.000Z'
                      amountCents: 0
                      method: stripe
                    - date: '2026-08-15T03:00:00.000Z'
                      amountCents: 0
                      method: stripe
                  payoutMethod: stripe
                  minPayoutCents: 1000
                  cryptoWalletIncomplete: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/orders:
    get:
      operationId: listOrders
      tags:
        - Orders
      x-scope: read:orders
      summary: List your store's order items (legacy page/limit pagination)
      description: |-
        NOTE — this endpoint uses legacy offset pagination (?page from 1,
        ?limit 1-50), NOT cursors. Returns order items of your store with the
        parent order and product; buyer email is never included. price,
        sellerAmount and platformAmount are integer cents.
      parameters:
        - name: page
          in: query
          required: false
          description: Page number, from 1.
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          description: Items per page, 1-50 (default 20).
          schema:
            type: integer
            default: 20
      x-errors:
        - unauthorized
        - insufficient_scope
        - rate_limited
      responses:
        '200':
          description: Order items with total/page/limit/hasMore at the top level (legacy shape).
