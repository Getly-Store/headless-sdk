      responses:
        '200':
          description: Analytics summary.
          content:
            application/json:
              example:
                success: true
                data:
                  totalSales: 42
                  totalRevenue: 97400
                  monthlySales: 5
                  monthlyRevenue: 11600
                  averageOrderValue: 2319
                  productCount: 7
                  totalDownloads: 156
                  salesByMonth:
                    - month: '2026-06'
                      sales: 12
                      revenue: 27840
                    - month: '2026-07'
                      sales: 5
