# Getly v1 API — OpenAPI 3.1 specification.
# Single source of truth for the SDK method names (operationId), the MCP tool
# names, the /developers/api reference and the generated llms.txt.
# Mirrored to the platform at https://www.getly.store/openapi.yaml.
#
# Formatting contract (scripts/generate-llms-txt.mjs parses this file with a
# small YAML-subset parser): 2-space indent, block scalars only via | / |-,
# no flow collections, no anchors/aliases, no inline comments after values.
openapi: 3.1.0
info:
  title: Getly v1 API
  version: 0.1.0
  summary: Run a digital-products store entirely through HTTP — products, files, blog posts, coupons, checkout links, license keys, webhooks and payouts.
  description: |-
    Getly.store is a digital goods marketplace. This API lets you (or your AI
    assistant) operate a seller store headlessly: create and publish products,
    upload downloadable files, write blog posts, issue coupons, mint instant
    checkout links, validate license keys from your shipped software, manage
    webhooks and read your money.

    Base URL: https://www.getly.store
    All request and response bodies are JSON (UTF-8) unless stated otherwise.
  x-conventions: |-
    - Auth: send `Authorization: Bearer <key>`. Keys look like `getly_sk_live_<hex>`
      (legacy `gk_` keys keep working). Read the key from the GETLY_API_KEY
      environment variable — never hardcode it, never pass it as a CLI argument,
      never log it.
    - Money: ALL amounts are integer cents (minor units) via `priceCents`,
      `compareAtPriceCents`, `discountedPriceCents`, `amountCents`,
      `minOrderAmountCents`, `valueCents`, `sellerAmount`, `platformAmount`.
      Legacy dollar-named fields exist for back-compat; use only the cents fields.
    - Envelope: success responses are `{ "success": true, "data": ... }`;
      errors are `{ "success": false, "error": "<human message>", "errorDetail":
      { "code", "message", "hint", "docsUrl", "param?" } }`. Branch on
      `errorDetail.code` — it is stable; `hint` says what to DO next.
    - Pagination: cursor-based. Lists return `{ "items": [...], "nextCursor":
      "<opaque>" | null }`; pass `?cursor=` to get the next page. The cursor is
      base64("createdAtISO|id") — treat it as opaque. `limit` is 1-100, default 20.
      (Exception: GET /api/v1/orders is legacy page/limit offset pagination.)
    - Idempotency: send an `Idempotency-Key` header (any unique string, ≤255
      chars) on every POST. Replays of a stored result return it verbatim with
      `Idempotency-Replayed: true`; a key still processing returns 409
      `idempotency_conflict` — wait 2-5s and retry with the SAME key. Keys live 24h.
    - Rate limits: every v1 response carries `X-RateLimit-Limit`,
      `X-RateLimit-Remaining` and `X-RateLimit-Reset` (seconds until the window
      resets). 429s also carry `Retry-After` (seconds). Throttle proactively when
      X-RateLimit-Remaining gets low. Daily creation caps (products 20/day,
      posts 5/day, coupons 30/day per key) return code `quota_exceeded`.
    - CORS: all v1 routes answer OPTIONS preflight and send
      `Access-Control-Allow-Origin: *`.
  x-quickstart:
    - title: List your products
      curl: |-
        curl https://www.getly.store/api/v1/products \
          -H "Authorization: Bearer $GETLY_API_KEY"
    - title: Create a draft product (price is integer cents)
      curl: |-
        curl -X POST https://www.getly.store/api/v1/products \
          -H "Authorization: Bearer $GETLY_API_KEY" \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: create-notion-template-001" \
          -d '{"name":"Notion Startup OS","priceCents":2900,"description":"A complete startup operating system for Notion.","status":"draft"}'
    - title: Mint an instant checkout link
      curl: |-
        curl -X POST https://www.getly.store/api/v1/checkout-links \
          -H "Authorization: Bearer $GETLY_API_KEY" \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: link-cust-42" \
          -d '{"productId":"3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f","reference":"customer-42"}'
  x-webhooks:
    description: |-
      Register endpoints with POST /api/v1/webhook-endpoints. Every delivery is
      signed twice: the modern `X-Getly-Signature-V2: t=<unixSeconds>,v1=<hex
      hmacSha256(secret, t + "." + rawBody)>` (verify t within 300 seconds
      tolerance, then compare the HMAC timing-safe) and the legacy
      `X-Getly-Signature: sha256=<hmacSha256(secret, rawBody)>`. The endpoint
      secret is returned exactly once at creation. Subscribing to '*' receives
      every event.
    signatureHeader: X-Getly-Signature-V2
    toleranceSeconds: 300
    events:
      - sale.completed
      - product.created
      - product.updated
      - review.created
      - download.completed
      - refund.created
      - refund.completed
      - order.refunded
      - checkout_link.completed
      - license.activated
      - dispute.created
      - dispute.resolved
      - subscription.created
      - subscription.cancelled
servers:
  - url: https://www.getly.store
security:
  - bearerAuth: []
tags:
  - name: Products
    description: Seller product catalog (create, publish, files).
  - name: Posts
    description: Creator blog posts (markdown source of truth).
  - name: Coupons
    description: Store discount codes.
  - name: Checkout Links
    description: Instant pay links with lazy Stripe session creation.
  - name: Licenses
    description: License keys — public validate/activate/deactivate + seller list.
  - name: Uploads
    description: Presigned direct-to-storage uploads.
  - name: Webhook Endpoints
    description: Webhook endpoint management.
  - name: Store
    description: Store profile, creation and payout onboarding.
  - name: Orders
    description: Read-only orders of the key's store.
  - name: Analytics
    description: Sales analytics and money snapshot.
  - name: Public
    description: No-auth endpoints (storefront widget, license checks, /go redirect).
paths:
  /api/v1/products:
    get:
      operationId: listProducts
      tags:
        - Products
      x-scope: read:products
      summary: List products of your store (cursor pagination)
      description: Ordered createdAt DESC. Filter by status (default active), category id, or a name search.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          required: false
          description: One of active, draft, pending_review, archived. Default active.
          schema:
            type: string
            enum:
              - active
              - draft
              - pending_review
              - archived
        - name: category
          in: query
          required: false
          description: Category id (uuid).
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Case-insensitive product-name substring search.
          schema:
            type: string
      x-errors:
        - unauthorized
        - insufficient_scope
        - validation_failed
        - rate_limited
      responses:
        '200':
          description: Page of products.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              example:
                success: true
                data:
                  items:
                    - id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                      name: Notion Startup OS
                      slug: notion-startup-os-lx2a9f
                      shortDescription: Run your startup from one Notion workspace.
                      priceCents: 2900
                      compareAtPriceCents: 4900
                      price: 2900
                      compareAtPrice: 4900
                      status: active
                      licenseKeysEnabled: false
                      licenseActivationLimit: 3
                      createdVia: api
                      urls:
                        product: https://www.getly.store/product/notion-startup-os-lx2a9f
                        buy: https://www.getly.store/product/notion-startup-os-lx2a9f
                        embed: https://www.getly.store/embed/product/3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                      createdAt: '2026-07-01T09:30:00.000Z'
                  nextCursor: MjAyNi0wNy0wMVQwOTozMDowMC4wMDBafDNmNmY0YTNl
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      operationId: createProduct
      tags:
        - Products
      x-scope: write:products
      summary: Create a product
      description: |-
        Accepts priceCents (preferred, integer minor units) or the deprecated
        dollar `price`. A product cannot be created directly as `active`
        without at least one downloadable file — create a draft, attach files,
        then publish. Stores with 0 completed sales get `pending_review`
        instead of `active` (first-sale trust gate). Daily cap 20 products/key.
        Provenance is recorded as createdVia="api".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      x-errors:
        - unauthorized
        - insufficient_scope
        - validation_failed
        - publish_requires_file
        - quota_exceeded
        - idempotency_conflict
        - rate_limited
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Notion Startup OS
              description: A complete startup operating system for Notion — hiring, fundraising, OKRs.
              shortDescription: Run your startup from one Notion workspace.
              priceCents: 2900
              compareAtPriceCents: 4900
              categoryId: 8a3d2b1c-5e6f-4a7b-9c8d-0e1f2a3b4c5d
              tags:
                - notion
                - template
              status: draft
              licenseKeysEnabled: true
              licenseActivationLimit: 3
              images:
                - url: https://cdn.getly.store/images/api/store-uuid/abc123.webp
                  altText: Dashboard preview
              files:
                - fileUrl: https://cdn.getly.store/files/user-uuid/xyz789.zip
                  fileName: notion-startup-os.zip
                  fileSize: 1048576
                  fileType: application/zip
      responses:
        '201':
          description: Product created (status draft, active, or pending_review when the trust gate applied).
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
          content:
            application/json:
              example:
                success: true
                data:
                  id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  name: Notion Startup OS
                  slug: notion-startup-os-lx2a9f
                  priceCents: 2900
                  compareAtPriceCents: 4900
                  status: draft
                  licenseKeysEnabled: true
                  licenseActivationLimit: 3
                  createdVia: api
                  attachedFiles: 1
                  urls:
                    product: https://www.getly.store/product/notion-startup-os-lx2a9f
                    buy: https://www.getly.store/product/notion-startup-os-lx2a9f
                    embed: https://www.getly.store/embed/product/3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
        '400':
          description: Validation failed, or status "active" requested with no valid downloadable file.
          content:
            application/json:
              example:
                success: false
                error: A product cannot be published (status "active") without at least one downloadable file. Create it as a draft and attach a file via POST /api/v1/products/{id}/files, then POST /api/v1/products/{id}/publish.
                errorDetail:
                  code: publish_requires_file
                  message: A product cannot be published (status "active") without at least one downloadable file.
                  hint: 'Attach at least one downloadable file first: POST /api/v1/products/{id}/files/presign → PUT the bytes → POST /api/v1/products/{id}/files. Then publish.'
                  docsUrl: https://www.getly.store/developers/api#errors
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          description: Rate limited, or the 20 products/day creation cap was hit (code quota_exceeded).
          content:
            application/json:
              example:
                success: false
                error: Daily product creation cap reached (20 per day per API key)
                errorDetail:
                  code: quota_exceeded
                  message: Daily product creation cap reached (20 per day per API key)
                  hint: Daily creation cap reached for this API key. Retry after the UTC midnight reset, or ask the user to contact support for a higher limit.
                  docsUrl: https://www.getly.store/developers/api#errors
  /api/v1/products/{id}:
    get:
      operationId: getProduct
      tags:
        - Products
      x-scope: read:products
      summary: Get a product (with images, files metadata, category, latest reviews)
      parameters:
        - $ref: '#/components/parameters/ProductId'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - rate_limited
      responses:
        '200':
          description: Product detail. File entries include metadata only (no download URLs).
          content:
            application/json:
              example:
                success: true
                data:
                  id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  name: Notion Startup OS
                  slug: notion-startup-os-lx2a9f
                  priceCents: 2900
                  compareAtPriceCents: null
                  status: active
                  licenseKeysEnabled: true
                  licenseActivationLimit: 3
                  images:
                    - url: https://cdn.getly.store/images/api/store-uuid/abc123.webp
                      altText: Dashboard preview
                      sortOrder: 0
                  files:
                    - id: 5c1d2e3f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
                      fileName: notion-startup-os.zip
                      fileSize: 1048576
                      fileType: application/zip
                      version: '1.0'
                      isLatest: true
                  urls:
                    product: https://www.getly.store/product/notion-startup-os-lx2a9f
                    buy: https://www.getly.store/product/notion-startup-os-lx2a9f
                    embed: https://www.getly.store/embed/product/3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
    patch:
      operationId: updateProduct
      tags:
        - Products
      x-scope: write:products
      summary: Update a product
      description: |-
        Updatable: name, description, shortDescription, status (active/draft/
        archived only), categoryId, tags, priceCents, compareAtPriceCents,
        licenseKeysEnabled, licenseActivationLimit, images (full replacement).
        Setting status "active" requires at least one downloadable file, and a
        product in pending_review/rejected cannot be self-published
        (moderation_locked). Providing `images` replaces the whole set.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - validation_failed
        - publish_requires_file
        - moderation_locked
        - rate_limited
      requestBody:
        required: true
        content:
          application/json:
            example:
              priceCents: 1900
              status: active
      responses:
        '200':
          description: Updated product (same shape as getProduct).
          content:
            application/json:
              example:
                success: true
                data:
                  id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  name: Notion Startup OS
                  slug: notion-startup-os-lx2a9f
                  priceCents: 1900
                  status: active
                  licenseKeysEnabled: true
                  licenseActivationLimit: 3
                  urls:
                    product: https://www.getly.store/product/notion-startup-os-lx2a9f
                    buy: https://www.getly.store/product/notion-startup-os-lx2a9f
                    embed: https://www.getly.store/embed/product/3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Missing scope, or the product is moderation-locked.
          content:
            application/json:
              example:
                success: false
                error: This product is under review and cannot be published until approved.
                errorDetail:
                  code: moderation_locked
                  message: This product is under review and cannot be published until approved.
                  hint: This product is awaiting (or was rejected in) moderation and cannot be self-published. Tell the user to check /dashboard/products — do not retry automatically.
                  docsUrl: https://www.getly.store/developers/api#errors
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
    delete:
      operationId: archiveProduct
      tags:
        - Products
      x-scope: write:products
      summary: Archive a product (soft delete)
      description: Sets status to "archived". Not a hard delete — existing orders and downloads keep working. Archiving an already-archived product succeeds.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - rate_limited
      responses:
        '200':
          description: Product archived.
          content:
            application/json:
              example:
                success: true
                data:
                  id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  status: archived
                message: Product archived
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/products/{id}/publish:
    post:
      operationId: publishProduct
      tags:
        - Products
      x-scope: write:products
      summary: Publish a product (one call, machine-readable blockers)
      description: |-
        Flips the product to "active". On failure returns 422 with code
        not_publishable and a `reasons` array — each entry has a machine
        `code` (missing_file | moderation_locked | already_active) and a
        `detail` explaining what to do. Stores with 0 completed sales get
        pending_review instead of active (first-sale trust gate).
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/IdempotencyKey'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - not_publishable
        - idempotency_conflict
        - rate_limited
      responses:
        '200':
          description: Published (status active, or pending_review when a trust/AI gate applied — then `moderationStatus` and `note` explain why).
          content:
            application/json:
              example:
                success: true
                data:
                  id: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  slug: notion-startup-os-lx2a9f
                  status: active
                  priceCents: 2900
                  urls:
                    product: https://www.getly.store/product/notion-startup-os-lx2a9f
                    buy: https://www.getly.store/product/notion-startup-os-lx2a9f
                    embed: https://www.getly.store/embed/product/3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          description: Not publishable — fix every entry in `reasons`, then call publish again.
          content:
            application/json:
              example:
                success: false
                error: Product is not publishable
                errorDetail:
                  code: not_publishable
                  message: Product is not publishable
                  hint: Fix every entry in `reasons` (each has a machine code and a detail explaining what to do), then call publish again.
                  docsUrl: https://www.getly.store/developers/api#errors
                reasons:
                  - code: missing_file
                    detail: 'Attach at least one downloadable file first: POST /api/v1/products/{id}/files/presign → PUT the bytes → POST /api/v1/products/{id}/files.'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/products/{id}/files:
    get:
      operationId: listProductFiles
      tags:
        - Products
      x-scope: read:products
      summary: List downloadable files attached to a product
      parameters:
        - $ref: '#/components/parameters/ProductId'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - rate_limited
      responses:
        '200':
          description: Attached files.
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 5c1d2e3f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
                    fileName: notion-startup-os.zip
                    fileUrl: https://cdn.getly.store/files/user-uuid/xyz789.zip
                    fileSize: 1048576
                    fileType: application/zip
                    version: '1.0'
                    isLatest: true
                    createdAt: '2026-07-01T09:30:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      operationId: attachProductFile
      tags:
        - Products
      x-scope: write:products
      summary: Attach a downloadable file to a product
      description: |-
        Two modes. (A) multipart/form-data with a `file` part — uploaded
        server-side (max 2GB, dangerous extensions blocked). (B) application/json
        `{ fileUrl, fileName, fileSize, fileType?, versionNotes? }` — attaches an
        object previously uploaded through the presign flow; fileUrl must be a
        URL this API issued for YOUR store (files/<yourUserId>/ prefix).
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/IdempotencyKey'
      x-errors:
        - unauthorized
        - insufficient_scope
        - not_found
        - validation_failed
        - idempotency_conflict
        - rate_limited
      requestBody:
        required: true
        content:
          application/json:
            example:
              fileUrl: https://cdn.getly.store/files/user-uuid/xyz789.zip
              fileName: notion-startup-os.zip
              fileSize: 1048576
              fileType: application/zip
              versionNotes: Initial release
      responses:
        '201':
          description: File attached.
          content:
            application/json:
              example:
                success: true
                data:
                  id: 5c1d2e3f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
                  productId: 3f6f4a3e-9d1e-4c1b-8f2a-1a2b3c4d5e6f
                  fileName: notion-startup-os.zip
                  fileUrl: https://cdn.getly.store/files/user-uuid/xyz789.zip
                  fileSize: 1048576
                  fileType: application/zip
                  isLatest: true
                  createdAt: '2026-07-01T09:35:00.000Z'
        '400':
          description: Validation failed (e.g. foreign fileUrl, blocked extension, bad size).
          content:
            application/json:
              example:
                success: false
                error: fileUrl must be an upload URL issued by this API for your own store (use the presign sub-route)
                errorDetail:
                  code: validation_failed
                  message: fileUrl must be an upload URL issued by this API for your own store (use the presign sub-route)
                  hint: Fix the field named in `param` and retry the same request (re-send your Idempotency-Key).
                  docsUrl: https://www.getly.store/developers/api#errors
                  param: fileUrl
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientScope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/products/{id}/files/presign:
    post:
      operationId: presignProductFile
      tags:
        - Products
        - Uploads
      x-scope: write:products
      summary: Get a presigned upload URL for a large product file
      description: |-
        3-step upload flow for files up to 2GB:
        1. POST here with { fileName, fileSize, fileType? } → { uploadUrl, fileUrl, key }.
        2. PUT the raw bytes to `uploadUrl` (expires in 1h). Content-Length is
           part of the signature — you must send exactly `fileSize` bytes.
