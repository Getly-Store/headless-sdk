<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Getly storefront widget — demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.5;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; margin-top: 40px; color: #374151; }
    code { background: #f3f4f6; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
    /* Theming demo: the second widget gets a purple accent + square corners
       purely via CSS custom properties. */
    .themed { --getly-accent: #7c3aed; --getly-radius: 4px; }
  </style>
</head>
<body>
  <h1>Getly storefront widget demo</h1>
  <p>
    Replace <code>demo-store</code> below with a real store slug
    (the part after <code>/store/</code> on getly.store) and open this file in a browser —
    no build step, no server needed.
  </p>

  <h2>1 — Default widget (English, API currency)</h2>
  <div data-getly-store="demo-store" data-limit="8"></div>

  <h2>2 — Russian locale, custom theme, translated labels</h2>
  <div
    class="themed"
    data-getly-store="demo-store"
    data-locale="ru"
    data-limit="4"
    data-i18n-buy="Купить"
    data-i18n-empty="Пока нет товаров"
    data-i18n-error="Не удалось загрузить товары"
    data-i18n-loading="Загрузка товаров…"
  ></div>

  <script src="getly-widget.js"></script>
</body>
</html>
